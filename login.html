<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MAIKO'S · Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c0f;--s1:#111419;--s2:#181c23;--s3:#1e2430;
  --acc:#00e5a0;--red:#ff4757;--txt:#e8ecf4;--mut:#6b7a8d;
}
html,body{
  height:100%;background:var(--bg);color:var(--txt);
  font-family:'DM Mono',monospace;
}
body{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,229,160,.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,160,.015) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none;z-index:0;
}

.login-box{
  position:relative;z-index:1;
  background:var(--s1);border:1px solid rgba(0,229,160,.15);
  border-radius:16px;padding:48px 44px;width:100%;max-width:400px;
  box-shadow:0 0 60px rgba(0,229,160,.05);
  animation:fadeIn .4s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.lb-logo{
  text-align:center;margin-bottom:36px;
}
.lb-title{
  font-family:'Bebas Neue',cursive;font-size:2.8rem;
  letter-spacing:4px;color:var(--acc);
  text-shadow:0 0 30px rgba(0,229,160,.3);
  margin-bottom:4px;
}
.lb-sub{font-size:.72rem;color:var(--mut);letter-spacing:1.5px}

.lb-form{display:flex;flex-direction:column;gap:14px}

.lb-label{
  font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--mut);margin-bottom:6px;display:block;
}
.lb-input{
  width:100%;padding:13px 16px;
  background:var(--s2);border:1px solid var(--s3);border-radius:8px;
  color:var(--txt);font-family:'DM Mono',monospace;font-size:.88rem;
  outline:none;transition:border-color .2s,box-shadow .2s;
  letter-spacing:2px;
}
.lb-input:focus{
  border-color:rgba(0,229,160,.4);
  box-shadow:0 0 0 3px rgba(0,229,160,.08);
}
.lb-input::placeholder{color:var(--mut);letter-spacing:0}

.lb-btn{
  width:100%;padding:13px;margin-top:6px;
  background:var(--acc);color:#0a0c0f;border:none;border-radius:8px;
  font-family:'Bebas Neue',cursive;font-size:1.1rem;letter-spacing:3px;
  cursor:pointer;transition:all .2s;
}
.lb-btn:hover{background:#00ffb3;box-shadow:0 4px 20px rgba(0,229,160,.3);transform:translateY(-1px)}
.lb-btn:active{transform:translateY(0)}
.lb-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.lb-error{
  display:none;padding:10px 14px;
  background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);
  border-radius:7px;font-size:.78rem;color:var(--red);
  text-align:center;animation:shake .3s ease;
}
.lb-error.show{display:block}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%,60%{transform:translateX(-6px)}
  40%,80%{transform:translateX(6px)}
}

.lb-spinner{
  display:none;width:18px;height:18px;
  border:2px solid rgba(10,12,15,.3);border-top-color:#0a0c0f;
  border-radius:50%;animation:spin .6s linear infinite;
  margin:0 auto;
}
.lb-spinner.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

.lb-footer{
  text-align:center;margin-top:28px;
  font-size:.62rem;color:var(--mut);letter-spacing:.5px;line-height:1.7;
}
</style>
</head>
<body>

<div class="login-box">
  <div class="lb-logo">
    <div class="lb-title">MAIKO'S</div>
    <div class="lb-sub">Dashboard · Acceso privado</div>
  </div>

  <form class="lb-form" onsubmit="doLogin(event)">
    <div>
      <label class="lb-label">Contraseña</label>
      <input
        class="lb-input"
        type="password"
        id="pwdInput"
        placeholder="Introduce la contraseña"
        autocomplete="current-password"
        autofocus
        required
      >
    </div>

    <div class="lb-error" id="errMsg">Contraseña incorrecta. Inténtalo de nuevo.</div>

    <button class="lb-btn" type="submit" id="loginBtn">
      <span id="btnText">ENTRAR</span>
      <div class="lb-spinner" id="btnSpinner"></div>
    </button>
  </form>

  <div class="lb-footer">
    Eneko · Maite · Xuhare · Aihen · Inhar<br>
    Acceso restringido — uso familiar
  </div>
</div>

<script>
async function doLogin(e) {
  e.preventDefault();
  const pwd    = document.getElementById('pwdInput').value;
  const btn    = document.getElementById('loginBtn');
  const txt    = document.getElementById('btnText');
  const spin   = document.getElementById('btnSpinner');
  const err    = document.getElementById('errMsg');

  // UI: loading state
  btn.disabled = true;
  txt.style.display = 'none';
  spin.classList.add('show');
  err.classList.remove('show');

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });

    if (res.ok) {
      // Redirigir a la página original o al inicio
      const params = new URLSearchParams(window.location.search);
      const from   = params.get('from') || '/';
      window.location.href = from;
    } else {
      throw new Error('wrong');
    }
  } catch {
    // Error: mostrar mensaje y resetear
    err.classList.add('show');
    btn.disabled = false;
    txt.style.display = '';
    spin.classList.remove('show');
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

// Enter en el input
document.getElementById('pwdInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin(e);
});
</script>
</body>
</html>
